# AI Image-to-Text config (example - copy to config.yaml and fill in your keys)
api:
  base_url: "https://your-api-proxy.com/v1"
  api_key: "sk-YOUR-API-KEY-HERE"
  model: "qwen3.6-plus"

# Processing options
options:
  max_context_lines_up: 3      # initial lines above image
  max_context_lines_down: 10    # initial lines below image
  max_window_up: 50            # maximum total lines above (cap)
  max_window_down: 50          # maximum total lines below (cap)
  max_retries: 3               # max AI tool_call rounds for more context
  temperature: 0.3
  max_tokens: 65536

# Paths
paths:
  input_dir: "./output"        # dir with merged .md files
  images_dir: "./output/images"
  output_dir: "./finally"
